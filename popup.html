<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg-body: #f8fafc;
      --bg-card: #ffffff;
      --bg-header: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --hover-bg: #f1f5f9;
      --input-bg: #ffffff;
      --track-bg: #f1f5f9;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --slide-ease: cubic-bezier(0.25, 1, 0.5, 1);
      --toner-black: #2C3E50;
    }

    [data-theme="dark"] {
      --bg-body: #0f172a;
      --bg-card: #1e293b;
      --bg-header: linear-gradient(135deg, #020617 0%, #0f172a 100%);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --hover-bg: #334155;
      --input-bg: #0f172a;
      --track-bg: #334155;
      --primary: #3b82f6;
      --primary-hover: #2563eb;
      --toner-black: #cbd5e1;
    }

    @keyframes spin { 100% { transform: rotate(360deg); } }
    @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    body { 
        width: 360px; height: 500px; margin: 0; 
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; 
        background-color: var(--bg-body); color: var(--text-main);
        overflow: hidden; transition: background-color 0.3s, color 0.3s;
    }
    
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }

    .header {
        background: var(--bg-header);
        color: #fff; padding: 12px 16px; 
        display: flex; align-items: center; justify-content: space-between;
        font-weight: 600; font-size: 15px;
        box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: relative; z-index: 10;
    }
    
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-logo { width: 24px; height: 24px; border-radius: 50%; }
    .header-actions { display: flex; gap: 12px; }
    .icon-btn { background: none; border: none; color: #cbd5e1; cursor: pointer; padding: 0; display: flex; align-items: center; transition: color 0.2s; }
    .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }
    .spinning { animation: spin 1s linear infinite; color: var(--primary) !important; }

    .slider-viewport { width: 100%; height: calc(100% - 48px); overflow: hidden; position: relative; }
    .slider-track { display: flex; height: 100%; width: 400%; transition: transform 0.4s var(--slide-ease); }
    .slide { width: 25%; height: 100%; flex-shrink: 0; padding: 16px; box-sizing: border-box; overflow-y: auto; overflow-x: hidden; }

    .list-header { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border-color); }
    .back-btn { background: none; border: none; color: var(--primary); cursor: pointer; font-weight: 600; font-size: 14px; padding: 0; display: flex; align-items: center; gap: 4px; transition: opacity 0.2s; }
    .back-btn:hover { opacity: 0.7; }
    .back-btn svg { width: 16px; height: 16px; fill: currentColor; }
    
    .list-item { background: var(--bg-card); padding: 14px; margin-bottom: 8px; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: all 0.2s ease; font-size: 13px; font-weight: 500; }
    .list-item:hover { background: var(--hover-bg); border-color: var(--primary); transform: translateX(2px); }
    .list-item-content { display: flex; align-items: center; gap: 10px; position: relative; }
    .item-subtitle { display: block; font-size: 11px; color: var(--text-muted); margin-top: 4px; font-weight: 400; }

    .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; position: absolute; bottom: 0; left: 12px; border: 2px solid var(--bg-card); }
    .status-active { background-color: #10b981; box-shadow: 0 0 5px rgba(16, 185, 129, 0.4); } 
    .status-offline { background-color: #ef4444; box-shadow: 0 0 5px rgba(239, 68, 68, 0.4); } 
    .status-inactive { background-color: #94a3b8; }

    input { width: 100%; margin-bottom: 14px; padding: 12px; box-sizing: border-box; border: 1px solid var(--border-color); border-radius: 8px; font-size: 13px; background-color: var(--input-bg); color: var(--text-main); outline: none; transition: border-color 0.2s; }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15); }
    
    button.btn { width: 100%; padding: 10px; font-weight: 600; font-size: 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; border: none; outline: none; }
    .btn-primary { background: var(--primary); color: #fff; margin-top: 8px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
    .btn-primary:hover { background: var(--primary-hover); transform: translateY(-1px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .btn-primary:active { transform: translateY(0); }
    .btn-secondary { background: var(--bg-body); color: var(--text-main); border: 1px solid var(--border-color); margin-top: 8px; }
    .btn-secondary:hover { background: var(--hover-bg); border-color: var(--text-muted); transform: translateY(-1px); }
    .btn-secondary:active { transform: translateY(0); }

    .skeleton { background: linear-gradient(90deg, var(--hover-bg) 25%, var(--border-color) 50%, var(--hover-bg) 75%); background-size: 200% 100%; animation: skeleton-loading 1.5s infinite; border-radius: 4px; height: 12px; margin-bottom: 10px; width: 100%; }

    .details-card { background: var(--bg-card); padding: 16px; border-radius: 10px; border: 1px solid var(--border-color); }
    .model-title { font-size: 15px; font-weight: 700; margin: 0 0 8px 0; }
    .alert-box { background: #fef2f2; border: 1px solid #f87171; color: #b91c1c; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 12px; display: none; }
    
    .network-info { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .network-badge { font-size: 10.5px; background: var(--bg-body); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--border-color); cursor: pointer; color: var(--text-muted); transition: all 0.2s; }
    .network-badge:hover { background: var(--border-color); color: var(--text-main); transform: scale(1.02); }
    
    .stats-row { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border-color); margin-bottom: 12px; padding-bottom: 10px; font-size: 11px; color: var(--text-muted); }
    .stats-row strong { color: var(--text-main); }

    .notes-container { margin-top: 15px; border-top: 1px solid var(--border-color); padding-top: 10px; }
    .notes-summary { cursor: pointer; font-size: 12px; font-weight: 600; color: var(--primary); display: flex; align-items: center; gap: 4px; user-select: none; transition: color 0.2s; }
    .notes-summary:hover { color: var(--primary-hover); }
    .notes-summary svg { width: 14px; height: 14px; fill: currentColor; transition: transform 0.2s; }
    .notes-summary.open svg { transform: rotate(90deg); }
    .notes-textarea { width: 100%; height: 60px; margin-top: 8px; font-family: inherit; resize: none; border-radius: 6px; border: 1px solid var(--border-color); padding: 8px; box-sizing: border-box; background: var(--input-bg); color: var(--text-main); font-size: 12px; display: none; outline: none; transition: border-color 0.2s; }
    .notes-textarea.open { display: block; }
    .notes-textarea:focus { border-color: var(--primary); }

    .supply-group-title { margin: 14px 0 8px 0; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    .toner-row { margin-bottom: 12px; }
    .toner-labels { display: flex; justify-content: space-between; font-size: 11px; font-weight: 600; margin-bottom: 6px; }
    .toner-track { background: var(--track-bg); height: 8px; border-radius: 4px; overflow: hidden; }
    .toner-fill { height: 100%; transition: width 0.8s var(--slide-ease); }
    
    #errorLog { color: #ef4444; font-size: 12px; margin-bottom: 15px; padding: 12px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 8px; display: none; }
  </style>
</head>
<body>
  
  <div class="header">
    <div class="header-left">
        <img src="logo.png" alt="Logo" class="header-logo">
        <span>FleetCommand</span>
    </div>
    <div class="header-actions">
        <button id="syncBtn" class="icon-btn" title="Sync Devices">
            <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6 0 1.01-.25 1.97-.7 2.8l1.46 1.46C19.54 15.03 20 13.57 20 12c0-4.42-3.58-8-8-8zm0 14c-3.31 0-6-2.69-6-6 0-1.01.25-1.97.7-2.8L5.24 7.74C4.46 8.97 4 10.43 4 12c0 4.42 3.58 8 8 8v3l4-4-4-4v3z"/></svg>
        </button>
        <button id="themeToggleBtn" class="icon-btn" title="Toggle Dark Mode"></button>
    </div>
  </div>

  <div class="slider-viewport">
      <div class="slider-track" id="sliderTrack">
          <div class="slide" id="slide0">
            <div id="errorLog"></div>
            <div id="setup" style="display:none;">
                <h3 style="margin-top:0;">Account Setup</h3>
                <input type="text" id="domain" placeholder="Domain (e.g., demo.princity.cloud)">
                <input type="password" id="apiKey" placeholder="API Key">
                <button id="saveKey" class="btn btn-primary">Connect Account</button>
            </div>
            <div id="main" style="display:none;">
                <input type="text" id="searchInput" placeholder="Search customer, model, SN or IP...">
                <div id="companyList"></div>
                <div id="searchResults" style="display:none;"></div>
            </div>
          </div>
          <div class="slide" id="slide1">
            <div class="list-header">
                <button class="back-btn" id="backBtn1">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg> Back
                </button>
                <span id="headerCompanyName" style="font-weight: 600; font-size: 14px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;"></span>
            </div>
            <input type="text" id="locationSearchInput" placeholder="Filter locations...">
            <div id="locationList"></div>
          </div>
          <div class="slide" id="slide2">
            <div class="list-header">
                <button class="back-btn" id="backBtn2">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg> Back
                </button>
                <span id="headerLocationName" style="font-weight: 600; font-size: 14px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap;"></span>
            </div>
            <div id="printerList"></div>
          </div>
          <div class="slide" id="slide3">
            <div class="list-header">
                <button class="back-btn" id="backBtn3">
                    <svg viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6 1.41-1.41z"/></svg> Back
                </button>
                <span style="font-weight: 600; font-size: 14px;">Device Details</span>
            </div>
            <div class="details-card">
              <div id="alertContainer" class="alert-box"></div>
              <h4 class="model-title" id="modelDisplay">Loading...</h4>
              <div class="network-info" id="networkDisplay"></div>
              <div class="stats-row">
                  <div id="meterDisplay">Total Pages: <strong>...</strong></div>
                  <div id="lastUpdateDisplay">Last Seen: <strong>...</strong></div>
              </div>
              <div id="supplies">
                  <div class="skeleton" style="width: 40%; margin-top: 10px;"></div>
                  <div class="skeleton"></div>
              </div>
              <div style="display:flex; gap: 8px;">
                <button id="remoteBtn" class="btn btn-primary" style="display: none; flex: 1;">Web Panel</button>
                <button id="devicePageBtn" class="btn btn-secondary" style="display: none; flex: 1;">Portal</button>
              </div>
              <button id="driverBtn" class="btn btn-secondary" style="display: none;">Find Drivers / Manual</button>
              <div class="notes-container">
                  <div class="notes-summary" id="notesToggle">
                      <svg viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6-1.41-1.41z"/></svg>
                      Local Notes
                  </div>
                  <textarea class="notes-textarea" id="localNotes" placeholder="Type notes here..."></textarea>
              </div>
            </div>
          </div>
      </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
